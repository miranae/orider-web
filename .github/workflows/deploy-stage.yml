name: Deploy (Hosting → stage)

# main에 머지된 빌드를 운영 태그 배포 전에 검증할 수 있는 영구 stage Hosting site로 배포한다.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-hosting-stage
  cancel-in-progress: true

jobs:
  deploy-stage:
    runs-on: ubuntu-latest
    environment: stage
    env:
      # Stage uses STAGE_* values only. Do not fall back to production repository
      # secrets/vars, otherwise OAuth/App Check issues are hidden until release.
      VITE_FIREBASE_API_KEY: ${{ secrets.STAGE_VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.STAGE_VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ vars.STAGE_VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.STAGE_VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.STAGE_VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.STAGE_VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_FUNCTIONS_REGION: ${{ vars.STAGE_VITE_FIREBASE_FUNCTIONS_REGION }}
      VITE_STRAVA_CLIENT_ID: ${{ secrets.STAGE_VITE_STRAVA_CLIENT_ID }}
      VITE_STRAVA_REDIRECT_URI: ${{ vars.STAGE_VITE_STRAVA_REDIRECT_URI }}
      VITE_SEGMENT_TILES_BASE: ${{ vars.STAGE_VITE_SEGMENT_TILES_BASE }}
      VITE_HEATMAP_BASE: ${{ vars.STAGE_VITE_HEATMAP_BASE }}
      VITE_MAPBOX_TOKEN: ${{ secrets.STAGE_VITE_MAPBOX_TOKEN }}
      VITE_APPCHECK_RECAPTCHA_SITE_KEY: ${{ secrets.STAGE_VITE_APPCHECK_RECAPTCHA_SITE_KEY }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Check deploy config
        run: npm run check:deploy-config
      - name: Build
        run: npm run build
      - name: Auth (Workload Identity Federation)
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.STAGE_GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.STAGE_GCP_SERVICE_ACCOUNT }}
          token_format: access_token
      - name: Deploy stage Hosting only
        run: |
          set -euo pipefail
          npm install -g firebase-tools
          set +e
          firebase deploy \
            --config firebase.stage.json \
            --only hosting \
            --project "${{ vars.STAGE_FIREBASE_PROJECT_ID }}" \
            --non-interactive \
            --token "${{ steps.auth.outputs.access_token }}" 2>&1 | tee firebase-stage-deploy.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ] && grep -q "is the current active version" firebase-stage-deploy.log; then
            echo "Firebase Hosting stage version is already active; treating deploy as idempotent success."
            exit 0
          fi
          exit "$status"
      - name: Verify stage deploy
        run: |
          set -euo pipefail
          built=$(grep -oE 'assets/index-[A-Za-z0-9_-]+\.js' dist/index.html | head -1)
          if [ -z "$built" ]; then echo "::error::빌드 index.html 에서 entry 청크를 못 찾음"; exit 1; fi
          live=$(curl -fsSL -H 'Cache-Control: no-cache' "https://miranae-orider-g1-stage.web.app/?cacheBust=${GITHUB_SHA}" | grep -oE 'assets/index-[A-Za-z0-9_-]+\.js' | head -1 || true)
          echo "built entry: $built"
          echo "stage entry: ${live:-<none>}"
          if [ "$live" != "$built" ]; then
            echo "::error::stage가 방금 빌드한 번들을 서빙하지 않음"
            exit 1
          fi
